name: Scrape Forex Factory Calendar

on:
  schedule:
    - cron: '0 * * * *' # Run every hour
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: |
          python scraper.py scrape

      - name: Commit and push updated calendar files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage the news directory containing outputs (specifically calendar.json and last_run)
          git add news/
          
          # Only commit and push if there are changes
          if ! git diff-index --quiet HEAD --; then
            git commit -m "Auto-update Forex Factory Calendar data [skip ci]"
            git push
          else
            echo "No changes in calendar data. Skipping commit."
          fi
